<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>cc-bridge</title>
<style>
  :root {
    --bg: #f8fafc;
    --fg: #0f172a;
    --muted: #64748b;
    --card: #ffffff;
    --border: #e2e8f0;
    --accent: #4f46e5;
    --accent-fg: #ffffff;
    --success: #16a34a;
    --danger: #dc2626;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b1120;
      --fg: #e2e8f0;
      --muted: #94a3b8;
      --card: #131c2e;
      --border: #263248;
      --accent: #6366f1;
      --accent-fg: #ffffff;
      --success: #22c55e;
      --danger: #f87171;
    }
  }
  :root[data-theme="light"] {
    --bg: #f8fafc; --fg: #0f172a; --muted: #64748b; --card: #ffffff;
    --border: #e2e8f0; --accent: #4f46e5; --success: #16a34a; --danger: #dc2626;
  }
  :root[data-theme="dark"] {
    --bg: #0b1120; --fg: #e2e8f0; --muted: #94a3b8; --card: #131c2e;
    --border: #263248; --accent: #6366f1; --success: #22c55e; --danger: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    line-height: 1.5;
  }
  .wrap { max-width: 960px; margin: 0 auto; padding: 24px 20px 64px; }
  header {
    display: flex; align-items: center; gap: 12px;
    padding-bottom: 20px; margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 18px; font-weight: 600; margin: 0; }
  .version { font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .spacer { flex: 1; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); display: inline-block; }
  .dot.ok { background: var(--success); box-shadow: 0 0 0 3px color-mix(in srgb, var(--success) 25%, transparent); }
  .dot.bad { background: var(--danger); }
  .status-pill { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
  button.icon-btn {
    border: 1px solid var(--border); background: var(--card); color: var(--fg);
    border-radius: 8px; padding: 6px 10px; font-size: 13px; cursor: pointer;
  }
  button.icon-btn:hover { border-color: var(--accent); }
  button.icon-btn:disabled { opacity: .4; cursor: not-allowed; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .card h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em;
    color: var(--muted); margin: 0 0 12px; }
  .kv { display: flex; justify-content: space-between; gap: 12px; padding: 5px 0; font-size: 14px; }
  .kv .k { color: var(--muted); }
  .kv .v { font-family: var(--mono); font-size: 13px; text-align: right; word-break: break-all; }
  .cmd-box {
    display: flex; gap: 8px; align-items: flex-start;
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; margin-top: 8px;
  }
  .cmd-box code { font-family: var(--mono); font-size: 12.5px; white-space: pre-wrap; word-break: break-all; flex: 1; }
  .btn {
    border: none; background: var(--accent); color: var(--accent-fg);
    border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; font-weight: 500;
  }
  .btn:hover { opacity: .92; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 600; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  td { padding: 7px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  td.path { font-family: var(--mono); word-break: break-all; }
  .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; }
  .empty { color: var(--muted); font-size: 13px; padding: 12px 0; }
  #tokenGate {
    max-width: 420px; margin: 80px auto; text-align: center;
  }
  #tokenGate input {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--fg); font-family: var(--mono); font-size: 13px; margin: 12px 0;
  }
  #tokenGate p { color: var(--muted); font-size: 13px; }
  #app { display: none; }

  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .field label { font-size: 12px; color: var(--muted); }
  .field input, .field textarea {
    padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); color: var(--fg); font-family: var(--mono); font-size: 13px;
  }
  .field textarea { min-height: 56px; resize: vertical; font-family: var(--sans); }
  .field-row { display: flex; gap: 8px; align-items: flex-end; }
  .field-row .field { flex: 1; margin-bottom: 0; }
  .root-row {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 6px 0; font-family: var(--mono); font-size: 13px; border-bottom: 1px solid var(--border);
  }
  .root-row:last-child { border-bottom: none; }
  .root-row span { word-break: break-all; }
  .icon-x {
    border: none; background: transparent; color: var(--muted); cursor: pointer;
    font-size: 16px; line-height: 1; padding: 2px 6px; border-radius: 6px; flex-shrink: 0;
  }
  .icon-x:hover { color: var(--danger); background: color-mix(in srgb, var(--danger) 12%, transparent); }
  .card-msg { font-size: 12.5px; margin-top: 10px; padding: 8px 10px; border-radius: 8px; display: none; }
  .card-msg.show { display: block; }
  .card-msg.ok { background: color-mix(in srgb, var(--success) 12%, transparent); color: var(--success); }
  .card-msg.err { background: color-mix(in srgb, var(--danger) 12%, transparent); color: var(--danger); }
  .card-msg.warn { background: color-mix(in srgb, var(--muted) 18%, transparent); color: var(--fg); }
  .restart-note { font-size: 12px; color: var(--muted); margin: 0 0 10px; }
  .card-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: none; align-items: center; justify-content: center; z-index: 50; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    width: min(520px, 100%); max-height: 80vh; display: flex; flex-direction: column;
    box-shadow: 0 12px 32px rgba(0,0,0,.25);
  }
  .modal-header { padding: 16px 18px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; }
  .breadcrumb { padding: 10px 18px; font-family: var(--mono); font-size: 12px; color: var(--muted); word-break: break-all; border-bottom: 1px solid var(--border); }
  .browse-list { flex: 1; overflow-y: auto; padding: 6px 0; min-height: 200px; }
  .browse-item { padding: 8px 18px; font-size: 13px; cursor: pointer; }
  .browse-item:hover { background: var(--bg); }
  .browse-empty { padding: 18px; font-size: 13px; color: var(--muted); }
  .modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

  .spinner {
    display: inline-block; width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid currentColor; border-right-color: transparent;
    animation: spin .7s linear infinite; vertical-align: -2px; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    .spinner { animation: none; border-right-color: currentColor; }
  }
  .icon-x.confirming {
    color: var(--danger); background: color-mix(in srgb, var(--danger) 15%, transparent);
    font-size: 11px; font-weight: 600; padding: 2px 8px; white-space: nowrap;
  }
</style>
</head>
<body>

<div class="wrap">
  <div id="tokenGate">
    <h1>cc-bridge</h1>
    <p>请粘贴服务器启动时打印在终端里的 token</p>
    <input id="tokenInput" type="text" placeholder="token" autocomplete="off" />
    <button class="btn" id="tokenSubmit">进入面板</button>
    <p id="tokenError" style="color: var(--danger);"></p>
  </div>

  <div id="app">
    <header>
      <span class="dot" id="healthDot"></span>
      <h1>cc-bridge</h1>
      <span class="version" id="versionLabel"></span>
      <div class="spacer"></div>
      <span class="status-pill" id="uptimeLabel"></span>
      <button class="icon-btn" id="themeToggle">切换主题</button>
      <button class="icon-btn" id="logoutBtn">更换 token</button>
    </header>

    <div class="card" style="margin-bottom:16px;">
      <h2>连接信息</h2>
      <div class="cmd-box">
        <code id="connectCommand">-</code>
        <button class="btn" id="copyBtn">复制</button>
      </div>
      <div class="card-actions">
        <button class="icon-btn" id="regenTokenBtn">重新生成 token</button>
      </div>
      <div class="card-msg" id="tokenMsg"></div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>白名单根目录</h2>
        <div id="rootsList"></div>
        <div class="field-row" style="margin-top:10px;">
          <div class="field">
            <label>添加目录（绝对路径）</label>
            <input type="text" id="newRootInput" placeholder="D:\projects\xxx" autocomplete="off" />
          </div>
          <button class="icon-btn" id="browseRootBtn">浏览…</button>
          <button class="icon-btn" id="addRootBtn">添加</button>
        </div>
        <div class="card-actions">
          <button class="btn" id="saveRootsBtn">保存</button>
        </div>
        <div class="card-msg" id="rootsMsg"></div>
      </div>

      <div class="card">
        <h2>安全与备份</h2>
        <div class="field">
          <label>扩展名白名单（逗号分隔，留空 = 不限制）</label>
          <textarea id="extInput" placeholder=".js, .ts, .py, .java, ..."></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label>单文件大小上限 (MB)</label>
            <input type="number" id="maxSizeInput" min="1" />
          </div>
          <div class="field">
            <label>备份保留份数</label>
            <input type="number" id="backupRetentionInput" min="1" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>限流：次数</label>
            <input type="number" id="rateMaxInput" min="1" />
          </div>
          <div class="field">
            <label>限流：窗口（秒）</label>
            <input type="number" id="rateWindowInput" min="1" />
          </div>
        </div>
        <div class="card-actions">
          <button class="btn" id="saveSecurityBtn">保存</button>
        </div>
        <div class="card-msg" id="securityMsg"></div>
      </div>

      <div class="card">
        <h2>网络设置</h2>
        <div class="restart-note">修改后需要重启服务才能生效（要重新绑定端口）。如果用的是桌面版，监听地址建议保持 0.0.0.0 或 127.0.0.1，改成具体局域网 IP 可能导致桌面窗口连不上自己的后台服务。</div>
        <div class="field-row">
          <div class="field">
            <label>监听地址 (host)</label>
            <input type="text" id="hostInput" />
          </div>
          <div class="field">
            <label>端口 (port)</label>
            <input type="number" id="portInput" min="1" max="65535" />
          </div>
        </div>
        <div class="card-actions">
          <button class="btn" id="saveNetworkBtn">保存</button>
        </div>
        <div class="card-msg" id="networkMsg"></div>
      </div>

      <div class="card">
        <h2>运行状态</h2>
        <div class="kv"><span class="k">运行时长</span><span class="v" id="uptimeValue">-</span></div>
        <div class="kv"><span class="k">总请求数</span><span class="v" id="totalRequests">-</span></div>
        <div class="kv"><span class="k">错误数</span><span class="v" id="totalErrors">-</span></div>
      </div>
    </div>

    <div class="card">
      <h2 style="display:flex; align-items:center; justify-content:space-between;">
        最近审计日志
        <button class="icon-btn" id="refreshAudit">刷新</button>
      </h2>
      <table>
        <thead>
          <tr><th>时间</th><th>工具</th><th>路径</th><th>结果</th></tr>
        </thead>
        <tbody id="auditBody"></tbody>
      </table>
      <div class="empty" id="auditEmpty" style="display:none;">暂无记录</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="browseModal">
  <div class="modal">
    <div class="modal-header">选择目录</div>
    <div class="breadcrumb" id="browseBreadcrumb">选择一个磁盘/根目录</div>
    <div class="browse-list" id="browseList"></div>
    <div class="modal-footer">
      <button class="icon-btn" id="browseUpBtn">上级目录</button>
      <button class="icon-btn" id="browseCancelBtn">取消</button>
      <button class="btn" id="browseSelectBtn">选择此目录</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="width:min(400px,100%);">
    <div class="modal-header">确认操作</div>
    <div style="padding:16px 18px; font-size:13px; line-height:1.6;" id="confirmMessage"></div>
    <div class="modal-footer">
      <button class="icon-btn" id="confirmCancelBtn">取消</button>
      <button class="btn" id="confirmOkBtn" style="background:var(--danger);">确定</button>
    </div>
  </div>
</div>

<script>
(function () {
  var TOKEN_KEY = 'ccBridgeToken';
  var THEME_KEY = 'ccBridgeTheme';
  var editableInitialized = false;
  var pendingRoots = [];
  var lastFocusedEl = null;

  var savedTheme = localStorage.getItem(THEME_KEY);
  if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

  // The desktop shell (desktop-app/) navigates its embedded window to
  // /?token=...&managed=1 so the user never has to paste the token by hand,
  // and so the network-settings save message can say "will auto-restart"
  // instead of "please restart manually" when it knows a supervisor
  // process is watching config.json and will restart the sidecar itself.
  var urlParams = new URLSearchParams(location.search);
  var managedMode = urlParams.get('managed') === '1';
  var urlToken = urlParams.get('token');
  if (urlToken) {
    localStorage.setItem(TOKEN_KEY, urlToken);
    history.replaceState({}, '', location.pathname);
  }

  function authHeaders() {
    var t = localStorage.getItem(TOKEN_KEY);
    return t ? { Authorization: 'Bearer ' + t } : {};
  }

  function showGate(errorMsg) {
    document.getElementById('tokenGate').style.display = 'block';
    document.getElementById('app').style.display = 'none';
    document.getElementById('tokenError').textContent = errorMsg || '';
  }

  function showApp() {
    document.getElementById('tokenGate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }

  function fmtBytes(n) {
    if (typeof n !== 'number') return '-';
    return (n / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function fmtUptime(sec) {
    if (typeof sec !== 'number') return '-';
    var h = Math.floor(sec / 3600);
    var m = Math.floor((sec % 3600) / 60);
    return h + ' 小时 ' + m + ' 分';
  }

  function showCardMsg(id, type, text) {
    var el = document.getElementById(id);
    el.className = 'card-msg show ' + type;
    el.textContent = text;
  }

  // Only for trusted, hard-coded markup (a spinner span) — never with
  // user-controlled or server-provided text, to avoid an HTML-injection path.
  function showCardMsgHtml(id, type, html) {
    var el = document.getElementById(id);
    el.className = 'card-msg show ' + type;
    el.innerHTML = html;
  }

  // Disables the button and swaps its label while an async action runs, so
  // a slow request can't be fired twice and the user can see it's working.
  function withLoading(btn, label, run) {
    var original = btn.textContent;
    btn.disabled = true;
    btn.textContent = label;
    return run().finally(function () {
      btn.disabled = false;
      btn.textContent = original;
    });
  }

  function parsePositiveInt(value) {
    if (value === '' || value == null) return NaN;
    var n = Number(value);
    return Number.isInteger(n) && n >= 1 ? n : NaN;
  }

  function renderRootsList(roots) {
    pendingRoots = roots.slice();
    var container = document.getElementById('rootsList');
    container.innerHTML = '';
    if (!pendingRoots.length) {
      var empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = '(空 —— 当前拒绝所有文件操作)';
      container.appendChild(empty);
      return;
    }
    pendingRoots.forEach(function (r, idx) {
      var row = document.createElement('div');
      row.className = 'root-row';
      var span = document.createElement('span');
      span.textContent = r;
      var btn = document.createElement('button');
      btn.className = 'icon-x';
      btn.title = '删除';
      btn.textContent = '×';
      // Two-click confirm instead of a native confirm() popup: first click
      // arms it ("确认?"), a second click within 2.5s actually removes the
      // row, otherwise it quietly reverts. Cheap insurance against a stray
      // misclick removing the wrong root.
      var revertTimer = null;
      btn.addEventListener('click', function () {
        if (!btn.classList.contains('confirming')) {
          btn.classList.add('confirming');
          btn.textContent = '确认?';
          revertTimer = setTimeout(function () {
            btn.classList.remove('confirming');
            btn.textContent = '×';
          }, 2500);
          return;
        }
        clearTimeout(revertTimer);
        pendingRoots.splice(idx, 1);
        renderRootsList(pendingRoots);
      });
      row.appendChild(span);
      row.appendChild(btn);
      container.appendChild(row);
    });
  }

  function fillEditableFields(data) {
    renderRootsList(data.allowedRoots || []);
    document.getElementById('extInput').value = (data.allowedExtensions || []).join(', ');
    document.getElementById('maxSizeInput').value = data.maxFileSizeBytes ? Math.round(data.maxFileSizeBytes / (1024 * 1024)) : '';
    document.getElementById('backupRetentionInput').value = data.backupRetention != null ? data.backupRetention : '';
    document.getElementById('rateMaxInput').value = data.rateLimit ? data.rateLimit.maxRequests : '';
    document.getElementById('rateWindowInput').value = data.rateLimit ? Math.round(data.rateLimit.windowMs / 1000) : '';
    document.getElementById('hostInput').value = data.host || '';
    document.getElementById('portInput').value = data.port || '';
  }

  function renderStatus(data) {
    document.getElementById('versionLabel').textContent = 'v' + (data.version || '');
    document.getElementById('connectCommand').textContent = data.connectCommand || '-';
    document.getElementById('uptimeLabel').textContent = fmtUptime(data.uptimeSeconds);
    document.getElementById('uptimeValue').textContent = fmtUptime(data.uptimeSeconds);
    document.getElementById('totalRequests').textContent = (data.stats && data.stats.totalRequests) || 0;
    document.getElementById('totalErrors').textContent = (data.stats && data.stats.totalErrors) || 0;

    // Editable fields are only filled once (on login) so a periodic refresh
    // never clobbers an in-progress edit; a successful save re-fills them
    // explicitly via fetchStatus() afterwards.
    if (!editableInitialized) {
      fillEditableFields(data);
      editableInitialized = true;
    }
  }

  function renderAudit(entries) {
    var body = document.getElementById('auditBody');
    var empty = document.getElementById('auditEmpty');
    body.innerHTML = '';
    if (!entries || !entries.length) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    entries.forEach(function (e) {
      var tr = document.createElement('tr');
      var ok = !!e.success;
      tr.innerHTML =
        '<td>' + new Date(e.timestamp).toLocaleString() + '</td>' +
        '<td>' + (e.tool || '-') + '</td>' +
        '<td class="path">' + summarizePath(e.paramsSummary) + '</td>' +
        '<td><span class="badge"><span class="dot ' + (ok ? 'ok' : 'bad') + '"></span>' + (ok ? '成功' : (e.error || '失败')) + '</span></td>';
      body.appendChild(tr);
    });
  }

  function summarizePath(summary) {
    if (!summary) return '-';
    if (typeof summary === 'string') return summary;
    try { return JSON.stringify(summary); } catch (e) { return '-'; }
  }

  function fetchHealth() {
    fetch('/health').then(function (r) {
      document.getElementById('healthDot').className = 'dot ' + (r.ok ? 'ok' : 'bad');
    }).catch(function () {
      document.getElementById('healthDot').className = 'dot bad';
    });
  }

  // Shared by every endpoint: a 401 here almost always means the token was
  // regenerated from a different tab/device (the old one keeps working
  // right up until that happens), not necessarily that this token was wrong
  // to begin with — say so, since "invalid, try again" leaves people who
  // typed it correctly stuck with no idea what changed.
  function handleAuthFailure() {
    localStorage.removeItem(TOKEN_KEY);
    editableInitialized = false;
    showGate('当前 token 已失效——可能是输入有误，也可能是在别处（其他标签页/设备）重新生成了新 token。请重新输入正确的 token。');
  }

  function fetchStatus() {
    return fetch('/status', { headers: authHeaders() }).then(function (r) {
      if (r.status === 401) { handleAuthFailure(); return null; }
      return r.json();
    }).then(function (data) {
      if (data) { showApp(); renderStatus(data); }
    }).catch(function () {});
  }

  function fetchAudit() {
    return fetch('/audit/recent?limit=50', { headers: authHeaders() }).then(function (r) {
      if (r.status === 401) { handleAuthFailure(); return null; }
      return r.json();
    }).then(function (data) {
      if (data) renderAudit(data);
    }).catch(function () {});
  }

  function refreshAll() {
    fetchHealth();
    fetchStatus();
    fetchAudit();
  }

  function postConfig(patch) {
    return fetch('/config', {
      method: 'POST',
      headers: Object.assign({ 'Content-Type': 'application/json' }, authHeaders()),
      body: JSON.stringify(patch),
    }).then(function (r) {
      if (r.status === 401) {
        handleAuthFailure();
        return { status: 401, body: { ok: false, authExpired: true } };
      }
      return r.json().then(function (body) { return { status: r.status, body: body }; });
    });
  }

  document.getElementById('tokenSubmit').addEventListener('click', function () {
    var val = document.getElementById('tokenInput').value.trim();
    if (!val) return;
    localStorage.setItem(TOKEN_KEY, val);
    refreshAll();
  });
  document.getElementById('tokenInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('tokenSubmit').click();
  });
  document.getElementById('logoutBtn').addEventListener('click', function () {
    localStorage.removeItem(TOKEN_KEY);
    editableInitialized = false;
    showGate();
  });
  // navigator.clipboard requires a "secure context" (HTTPS or localhost).
  // This panel is normally opened over plain http://<lan-ip>:port/, which
  // is neither — so navigator.clipboard is often just undefined here, and
  // the button would silently do nothing without this fallback.
  function copyToClipboard(text) {
    if (navigator.clipboard && window.isSecureContext) {
      return navigator.clipboard.writeText(text);
    }
    return new Promise(function (resolve, reject) {
      try {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        var ok = document.execCommand('copy');
        document.body.removeChild(ta);
        if (ok) resolve(); else reject(new Error('execCommand copy failed'));
      } catch (e) {
        reject(e);
      }
    });
  }

  document.getElementById('copyBtn').addEventListener('click', function () {
    var btn = this;
    var text = document.getElementById('connectCommand').textContent;
    var original = btn.textContent;
    copyToClipboard(text).then(function () {
      btn.textContent = '已复制';
    }).catch(function () {
      btn.textContent = '复制失败，请手动选中';
    }).finally(function () {
      setTimeout(function () { btn.textContent = original; }, 1800);
    });
  });
  document.getElementById('refreshAudit').addEventListener('click', fetchAudit);
  document.getElementById('themeToggle').addEventListener('click', function () {
    var current = document.documentElement.getAttribute('data-theme') ||
      (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem(THEME_KEY, next);
  });

  // --- 白名单根目录 ---
  document.getElementById('addRootBtn').addEventListener('click', function () {
    var input = document.getElementById('newRootInput');
    var val = input.value.trim();
    if (!val) return;
    pendingRoots.push(val);
    input.value = '';
    renderRootsList(pendingRoots);
  });
  document.getElementById('newRootInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('addRootBtn').click();
  });
  document.getElementById('saveRootsBtn').addEventListener('click', function () {
    var btn = this;
    withLoading(btn, '保存中…', function () {
      return postConfig({ allowedRoots: pendingRoots }).then(function (res) {
        if (res.body.ok) {
          var hasWarnings = res.body.warnings && res.body.warnings.length;
          showCardMsg('rootsMsg', hasWarnings ? 'warn' : 'ok', hasWarnings ? res.body.warnings.join('；') : '已保存，立即生效');
          return fetchStatus();
        } else if (!res.body.authExpired) {
          showCardMsg('rootsMsg', 'err', (res.body.errors && res.body.errors.allowedRoots) || '保存失败');
        }
      }).catch(function () { showCardMsg('rootsMsg', 'err', '网络错误，保存失败'); });
    });
  });

  // --- 安全与备份 ---
  document.getElementById('saveSecurityBtn').addEventListener('click', function () {
    var btn = this;
    var maxSizeMb = parsePositiveInt(document.getElementById('maxSizeInput').value);
    var backupRetention = parsePositiveInt(document.getElementById('backupRetentionInput').value);
    var rateMax = parsePositiveInt(document.getElementById('rateMaxInput').value);
    var rateWindow = parsePositiveInt(document.getElementById('rateWindowInput').value);
    // Validate locally first so obviously-bad input (empty, 0, non-integer)
    // gets an immediate inline error instead of a round-trip to the server.
    if (isNaN(maxSizeMb)) return showCardMsg('securityMsg', 'err', '单文件大小上限必须是 >= 1 的整数 (MB)');
    if (isNaN(backupRetention)) return showCardMsg('securityMsg', 'err', '备份保留份数必须是 >= 1 的整数');
    if (isNaN(rateMax)) return showCardMsg('securityMsg', 'err', '限流次数必须是 >= 1 的整数');
    if (isNaN(rateWindow)) return showCardMsg('securityMsg', 'err', '限流窗口必须是 >= 1 的整数（秒）');

    var extRaw = document.getElementById('extInput').value.trim();
    var exts = extRaw ? extRaw.split(',').map(function (s) { return s.trim(); }).filter(Boolean) : [];
    var patch = {
      allowedExtensions: exts,
      maxFileSizeBytes: maxSizeMb * 1024 * 1024,
      backupRetention: backupRetention,
      rateLimit: { maxRequests: rateMax, windowMs: rateWindow * 1000 },
    };
    withLoading(btn, '保存中…', function () {
      return postConfig(patch).then(function (res) {
        if (res.body.ok) {
          showCardMsg('securityMsg', 'ok', '已保存，立即生效');
          return fetchStatus();
        } else if (!res.body.authExpired) {
          showCardMsg('securityMsg', 'err', Object.values(res.body.errors || {}).join('；') || '保存失败');
        }
      }).catch(function () { showCardMsg('securityMsg', 'err', '网络错误，保存失败'); });
    });
  });

  // --- 网络设置 ---
  // Handled without withLoading() on purpose: in managed mode a successful
  // save should keep the button disabled through the restart window
  // (there's nothing useful to click while the sidecar is bouncing), which
  // withLoading's unconditional re-enable-on-settle wouldn't allow.
  document.getElementById('saveNetworkBtn').addEventListener('click', function () {
    var btn = this;
    var hostVal = document.getElementById('hostInput').value.trim();
    var portNum = parsePositiveInt(document.getElementById('portInput').value);
    if (!hostVal) return showCardMsg('networkMsg', 'err', '监听地址不能为空');
    if (isNaN(portNum) || portNum > 65535) return showCardMsg('networkMsg', 'err', '端口必须是 1-65535 之间的整数');

    var originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '保存中…';
    postConfig({ host: hostVal, port: portNum }).then(function (res) {
      if (res.body.ok) {
        if (managedMode) {
          // There's a real 5-10s window here (config poll interval + sidecar
          // restart + readiness wait) where nothing visibly happens before
          // the desktop shell navigates this window away — a spinner beats
          // a static message users might assume is stuck or didn't register.
          showCardMsgHtml('networkMsg', 'ok', '<span class="spinner"></span>正在自动重启服务并跳转到新地址，请稍候…');
          btn.textContent = '重启中…';
          return; // stays disabled; the shell navigates this page away once ready
        }
        showCardMsg('networkMsg', 'warn', '已保存到配置文件，需要手动重启服务才能生效');
      } else if (!res.body.authExpired) {
        showCardMsg('networkMsg', 'err', Object.values(res.body.errors || {}).join('；') || '保存失败');
      }
      btn.disabled = false;
      btn.textContent = originalText;
    }).catch(function () {
      showCardMsg('networkMsg', 'err', '网络错误，保存失败');
      btn.disabled = false;
      btn.textContent = originalText;
    });
  });

  // --- generic modal helpers: Escape to close, click on the dimmed
  // backdrop to close, and focus moves into/back out of the dialog so
  // keyboard/screen-reader users aren't left tabbing through a hidden
  // background page ---
  function openModal(overlayEl, focusEl) {
    lastFocusedEl = document.activeElement;
    overlayEl.classList.add('show');
    if (focusEl) focusEl.focus();
  }
  function closeModal(overlayEl) {
    overlayEl.classList.remove('show');
    if (lastFocusedEl && typeof lastFocusedEl.focus === 'function') lastFocusedEl.focus();
    lastFocusedEl = null;
  }
  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Escape') return;
    if (document.getElementById('browseModal').classList.contains('show')) closeBrowseModal();
    else if (document.getElementById('confirmModal').classList.contains('show')) closeConfirm(false);
  });
  document.getElementById('browseModal').addEventListener('click', function (e) {
    if (e.target === this) closeBrowseModal();
  });
  document.getElementById('confirmModal').addEventListener('click', function (e) {
    if (e.target === this) closeConfirm(false);
  });

  // --- generic confirm dialog (replaces the browser's native confirm(),
  // which looks like an OS dialog and clashes with everything else here
  // being custom-styled) ---
  var confirmResolve = null;
  function showConfirm(message) {
    document.getElementById('confirmMessage').textContent = message;
    openModal(document.getElementById('confirmModal'), document.getElementById('confirmCancelBtn'));
    return new Promise(function (resolve) { confirmResolve = resolve; });
  }
  function closeConfirm(result) {
    closeModal(document.getElementById('confirmModal'));
    var resolve = confirmResolve;
    confirmResolve = null;
    if (resolve) resolve(result);
  }
  document.getElementById('confirmCancelBtn').addEventListener('click', function () { closeConfirm(false); });
  document.getElementById('confirmOkBtn').addEventListener('click', function () { closeConfirm(true); });

  // --- token ---
  document.getElementById('regenTokenBtn').addEventListener('click', function () {
    var btn = this;
    showConfirm('重新生成 token 后，当前 token 会立刻失效。所有已经登录的页面/设备都需要用新 token 重新登录。确定继续吗？').then(function (ok) {
      if (!ok) return;
      withLoading(btn, '生成中…', function () {
        return fetch('/config/token/regenerate', { method: 'POST', headers: authHeaders() })
          .then(function (r) {
            if (r.status === 401) { handleAuthFailure(); return null; }
            return r.json();
          })
          .then(function (body) {
            if (!body) return;
            if (body.ok) {
              localStorage.setItem(TOKEN_KEY, body.token);
              showCardMsg('tokenMsg', 'ok', '已生成新 token，本页面已自动更新');
              return fetchStatus();
            }
            showCardMsg('tokenMsg', 'err', '生成失败');
          }).catch(function () { showCardMsg('tokenMsg', 'err', '网络错误'); });
      });
    });
  });

  // --- 目录浏览弹窗 ---
  var browseCurrentPath = null;
  var browseParentPath = null;

  function openBrowseModal() {
    openModal(document.getElementById('browseModal'), document.getElementById('browseCancelBtn'));
    loadBrowse('');
  }
  function closeBrowseModal() {
    closeModal(document.getElementById('browseModal'));
  }
  function loadBrowse(p) {
    var url = '/fs/browse' + (p ? ('?path=' + encodeURIComponent(p)) : '');
    fetch(url, { headers: authHeaders() }).then(function (r) {
      return r.json().then(function (body) { return { status: r.status, body: body }; });
    }).then(function (res) {
      if (res.status !== 200) {
        document.getElementById('browseBreadcrumb').textContent = '出错: ' + (res.body.error || '未知错误');
        return;
      }
      browseCurrentPath = res.body.path;
      browseParentPath = res.body.parent;
      document.getElementById('browseBreadcrumb').textContent = browseCurrentPath || '选择一个磁盘/根目录';
      document.getElementById('browseUpBtn').disabled = !browseParentPath;
      var list = document.getElementById('browseList');
      list.innerHTML = '';
      if (!res.body.entries.length) {
        var empty = document.createElement('div');
        empty.className = 'browse-empty';
        empty.textContent = '（这个目录下没有子目录）';
        list.appendChild(empty);
        return;
      }
      res.body.entries.forEach(function (entry) {
        var row = document.createElement('div');
        row.className = 'browse-item';
        row.textContent = entry.name + '/';
        row.addEventListener('click', function () { loadBrowse(entry.path); });
        list.appendChild(row);
      });
    });
  }

  document.getElementById('browseRootBtn').addEventListener('click', openBrowseModal);
  document.getElementById('browseCancelBtn').addEventListener('click', closeBrowseModal);
  document.getElementById('browseUpBtn').addEventListener('click', function () {
    loadBrowse(browseParentPath || '');
  });
  document.getElementById('browseSelectBtn').addEventListener('click', function () {
    if (browseCurrentPath) {
      document.getElementById('newRootInput').value = browseCurrentPath;
    }
    closeBrowseModal();
  });

  if (localStorage.getItem(TOKEN_KEY)) {
    refreshAll();
  } else {
    showGate();
  }
  fetchHealth();
  setInterval(refreshAll, 15000);
})();
</script>
</body>
</html>
