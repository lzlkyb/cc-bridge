name: Build

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    name: Run Rust test suite (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: cargo test
        run: cargo test
        working-directory: desktop/src-tauri

  build-windows:
    name: Build Windows exe + installer
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write   # 创建 GitHub Release 需要写权限（默认 token 只读）
    steps:
      - uses: actions/checkout@v4

      - name: 🔑 准备签名密钥（文件路径方式）
        shell: pwsh
        run: |
          $raw = '${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}'
          if ([string]::IsNullOrWhiteSpace($raw)) {
            Write-Host "⚠️ TAURI_SIGNING_PRIVATE_KEY 未设置，本次构建将不产生签名（.sig），updater 无法验证。"
            "TAURI_KEY_FILE=" >> $env:GITHUB_ENV
            exit 0
          }
          $keyFile = "${{ runner.temp }}\tauri-signing.key"
          [System.IO.File]::WriteAllText($keyFile, $raw, [System.Text.Encoding]::ASCII)
          "TAURI_KEY_FILE=$keyFile" >> $env:GITHUB_ENV
          Write-Host "密钥文件已写入: $keyFile"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Build Tauri desktop app (NSIS installer)
        shell: pwsh
        run: |
          npm ci
          # Workaround for https://github.com/npm/cli/issues/4828 — Tauri CLI 的 Windows native binding 是 optionalDependencies，
          # 在 fresh runner 上可能不被 npm 安装，导致 tauri build 报 Cannot find native binding。
          # 显式再装一次（幂等：已存在则跳过），不写回 package.json / package-lock.json（--no-save）。
          npm install @tauri-apps/cli-win32-x64-msvc --no-save
          # prebuild（版本同步 + 生成 changelog.generated.ts）独立执行，
          # 避免在 npm run 的 pre→build 钩子链中改写 package.json 导致后续 tauri 路径丢失。
          npm run prebuild
          $env:TAURI_SIGNING_PRIVATE_KEY = $env:TAURI_KEY_FILE
          $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = ""   # 空密码，避免 CI 无 TTY 时交互式提示卡死
          # npx 直接从 node_modules/.bin 解析 tauri，不依赖 npm run 的 PATH 上下文。
          npx tauri build
        working-directory: desktop

      - name: 抽取更新说明 (CHANGELOG)
        shell: pwsh
        run: |
          $changelog = Get-Content -Raw -Path CHANGELOG.md
          # 抽取「用户向分类小节」（含顶部 ### 更新摘要，渲染为弹框高亮卡片；及 ### 新增/修复/变更/优化/安全 等），写入更新弹框。
          # 每个小节下列 1~3 条人话要点（无代码符号、无根因），让用户一眼看懂升级了什么。
          # 正则要求版本号形如 x.y.z，避免误抓 [Unreleased]；抓到下一个版本头为止。
          # 剔除不进弹框的小节：### 用户摘要 / ### 技术细节 / ### 实现说明 / ### 开发者。
          if ($changelog -match '(?s)##\s*\[\d+\.\d+\.\d+\][^\n]*\n(.*?)(?=\n##\s\[|$)') {
            $notes = $matches[1].Trim()
            $notes = $notes -replace '(?s)\n###\s*(用户摘要|技术细节|实现说明|开发者)[\s\S]*?(?=\n###\s|\n##\s|$)', ''
            $notes = $notes.Trim()
            "UPDATER_NOTES<<EOF" >> $env:GITHUB_ENV
            $notes >> $env:GITHUB_ENV
            "EOF" >> $env:GITHUB_ENV
            Write-Host "已抽取用户向分类说明 ($($notes.Length) 字符)"
          } else {
            Write-Host "未在 CHANGELOG 中找到已发布版本段，使用默认说明"
          }

      - name: 生成 updater.json
        shell: pwsh
        run: npm run updater:generate
        working-directory: desktop
        env:
          GITHUB_RELEASE_TAG: ${{ github.ref_name }}
          # 二进制下载走 ghproxy 镜像，解决国内用户下载慢；元数据检查另有 tauri.conf.json 的 GitHub 端点兜底。
          # 注意：updater.json 的 url 为单值、无二进制级兜底，故 ghproxy 域名需稳定；若失效改此 env + config 即可。
          UPDATER_DOWNLOAD_BASE: "https://ghproxy.net/https://github.com/${{ github.repository }}/releases/download"

      - name: 校验 updater.json 签名非空
        shell: pwsh
        run: |
          $json = Get-Content -Raw -Path desktop/dist/updater.json | ConvertFrom-Json
          $sig = $json.platforms.'windows-x86_64'.signature
          if ([string]::IsNullOrWhiteSpace($sig)) {
            Write-Error "updater.json 的 windows-x86_64.signature 为空，自动更新将无法校验签名。请确认 TAURI_SIGNING_PRIVATE_KEY 已配置且构建产生 .sig。"
            exit 1
          }
          Write-Host "updater.json 签名校验通过"

      - name: 📦 打包绿色便携版
        shell: pwsh
        run: |
          $version = (Get-Content desktop/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $exePath = "desktop/src-tauri/target/release/cc-bridge-desktop.exe"
          $zipName = "cc-bridge_$version`_x86_64-pc-windows-msvc.zip"

          if (-not (Test-Path $exePath)) {
            Write-Host "❌ 绿色版 exe 不存在: $exePath"
            exit 1
          }

          $exeDir = Split-Path $exePath -Parent
          $exeName = Split-Path $exePath -Leaf
          $zipFullPath = Join-Path $env:GITHUB_WORKSPACE $zipName
          Push-Location $exeDir
          Compress-Archive -Path $exeName -DestinationPath $zipFullPath -Force
          Pop-Location

          Write-Host "✅ 绿色版打包完成: $zipName"
          Write-Host "文件大小: $((Get-Item $zipFullPath).Length / 1MB) MB"

      - name: Collect artifacts
        shell: pwsh
        run: |
          mkdir dist-out -ErrorAction SilentlyContinue
          Copy-Item desktop\src-tauri\target\release\bundle\nsis\*.exe dist-out\ -ErrorAction SilentlyContinue
          Copy-Item desktop\src-tauri\target\release\bundle\nsis\*.exe.sig dist-out\ -ErrorAction SilentlyContinue
          Copy-Item desktop\dist\updater.json dist-out\ -ErrorAction SilentlyContinue
          Copy-Item cc-bridge_*.zip dist-out\ -ErrorAction SilentlyContinue

      - uses: actions/upload-artifact@v4
        with:
          name: cc-bridge-windows
          path: dist-out/*

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-out/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 以下两步解决国内用户直连 GitHub 下载安装包不稳定/很慢的问题：把产物同步一份到 Gitee（国内访问远比任何公共
      # GitHub 代理稳定），客户端（commands.rs）优先试 Gitee，失败再回退到现有的 ghproxy/GitHub 路径。
      # 两个 secret（GITEE_TOKEN/GITEE_REPOSITORY）未配置时自动跳过，不影响现有发版流程。
      - name: 生成 Gitee 版 updater-gitee.json（国内加速镜像，可选）
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ secrets.GITEE_REPOSITORY }}")) {
            Write-Host "⚠️ 未配置 GITEE_REPOSITORY secret，跳过 Gitee 镜像 manifest 生成（自动更新仍走现有 GitHub/ghproxy 路径）。"
            exit 0
          }
          npm run updater:generate
        working-directory: desktop
        env:
          GITHUB_RELEASE_TAG: ${{ github.ref_name }}
          # Gitee raw 文件直链与 GitHub Release 拼法形状不同（owner/repo/raw/ref/path，非
          # base/tag/filename），用 UPDATER_URL_TEMPLATE 完全接管拼接（见 generate-updater-json.mjs）。
          # 固定走 releases 分支下的 latest/ 目录（每次发版覆盖，不按 tag 累加）：
          # 客户端检查更新时事先不知道最新 tag 是什么，需要一个固定不变的 URL（对齐 GitHub
          # 的 releases/latest/download 语义）；固定目录也避免了镜像仓库随发版次数无限增长。
          UPDATER_URL_TEMPLATE: "https://gitee.com/${{ secrets.GITEE_REPOSITORY }}/raw/releases/latest/{filename}"
          UPDATER_OUTPUT_FILENAME: "updater-gitee.json"

      - name: 镜像发布产物到 Gitee（国内加速，可选）
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPOSITORY: ${{ secrets.GITEE_REPOSITORY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GITEE_TOKEN) -or [string]::IsNullOrWhiteSpace($env:GITEE_REPOSITORY)) {
            Write-Host "⚠️ 未配置 GITEE_TOKEN/GITEE_REPOSITORY secret，跳过 Gitee 镜像发布。"
            exit 0
          }
          $tag = "${{ github.ref_name }}"
          try {
            $giteeUrl = "https://oauth2:$($env:GITEE_TOKEN)@gitee.com/$($env:GITEE_REPOSITORY).git"
            $mirrorDir = Join-Path $env:RUNNER_TEMP "gitee-mirror"

            # 独立临时目录里操作 Gitee remote，不动主 checkout 的分支/工作区状态。
            git clone --depth 1 --branch releases $giteeUrl $mirrorDir 2>&1
            if ($LASTEXITCODE -ne 0) {
              # releases 分支还不存在（首次发布）：clone 默认分支后本地新建孤儿分支。
              git clone --depth 1 $giteeUrl $mirrorDir 2>&1
              Push-Location $mirrorDir
              git checkout --orphan releases
              git reset --hard
              Pop-Location
            }

            # 固定覆盖 latest/ 目录（不按 tag 累加）：先清空旧内容再写新的，避免上一个版本不同文件名的
            # exe/sig 残留下来。
            $destDir = Join-Path $mirrorDir "latest"
            if (Test-Path $destDir) { Remove-Item $destDir -Recurse -Force }
            New-Item -ItemType Directory -Path $destDir -Force | Out-Null
            Copy-Item dist-out/*.exe $destDir/ -ErrorAction SilentlyContinue
            Copy-Item dist-out/*.exe.sig $destDir/ -ErrorAction SilentlyContinue
            Copy-Item desktop/dist/updater-gitee.json $destDir/ -ErrorAction SilentlyContinue

            Push-Location $mirrorDir
            git add -A latest
            git -c user.email="ci@cc-bridge.local" -c user.name="cc-bridge-ci" commit -m "release: mirror $tag to Gitee (latest)"
            git push origin releases
            Pop-Location

            Write-Host "✅ 已镜像到 Gitee releases 分支：$tag"
          } catch {
            Write-Host "⚠️ Gitee 镜像发布失败（不影响本次 GitHub Release 已发布内容，自动更新仍可走现有 GitHub/ghproxy 路径）：$_"
            exit 0
          }
