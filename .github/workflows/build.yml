name: Build

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    name: Run Rust test suite (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: cargo test
        run: cargo test
        working-directory: desktop/src-tauri

  build-windows:
    name: Build Windows exe + installer
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write   # 创建 GitHub Release 需要写权限（默认 token 只读）
    steps:
      - uses: actions/checkout@v4

      - name: 🔑 准备签名密钥（文件路径方式）
        shell: pwsh
        run: |
          $raw = '${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}'
          if ([string]::IsNullOrWhiteSpace($raw)) {
            Write-Host "⚠️ TAURI_SIGNING_PRIVATE_KEY 未设置，本次构建将不产生签名（.sig），updater 无法验证。"
            "TAURI_KEY_FILE=" >> $env:GITHUB_ENV
            exit 0
          }
          $keyFile = "${{ runner.temp }}\tauri-signing.key"
          [System.IO.File]::WriteAllText($keyFile, $raw, [System.Text.Encoding]::ASCII)
          "TAURI_KEY_FILE=$keyFile" >> $env:GITHUB_ENV
          Write-Host "密钥文件已写入: $keyFile"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Build Tauri desktop app (NSIS installer)
        shell: pwsh
        run: |
          npm ci
          # Workaround for https://github.com/npm/cli/issues/4828 — Tauri CLI 的 Windows native binding 是 optionalDependencies，
          # 在 fresh runner 上可能不被 npm 安装，导致 tauri build 报 Cannot find native binding。
          # 显式再装一次（幂等：已存在则跳过），不写回 package.json / package-lock.json（--no-save）。
          npm install @tauri-apps/cli-win32-x64-msvc --no-save
          $env:TAURI_SIGNING_PRIVATE_KEY = $env:TAURI_KEY_FILE
          $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = ""   # 空密码，避免 CI 无 TTY 时交互式提示卡死
          npm run build
        working-directory: desktop

      - name: 生成 updater.json
        shell: pwsh
        run: npm run updater:generate
        working-directory: desktop
        env:
          GITHUB_RELEASE_TAG: ${{ github.ref_name }}

      - name: 📦 打包绿色便携版
        shell: pwsh
        run: |
          $version = (Get-Content desktop/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $exePath = "desktop/src-tauri/target/release/cc-bridge-desktop.exe"
          $zipName = "cc-bridge_$version`_x86_64-pc-windows-msvc.zip"

          if (-not (Test-Path $exePath)) {
            Write-Host "❌ 绿色版 exe 不存在: $exePath"
            exit 1
          }

          $exeDir = Split-Path $exePath -Parent
          $exeName = Split-Path $exePath -Leaf
          $zipFullPath = Join-Path $env:GITHUB_WORKSPACE $zipName
          Push-Location $exeDir
          Compress-Archive -Path $exeName -DestinationPath $zipFullPath -Force
          Pop-Location

          Write-Host "✅ 绿色版打包完成: $zipName"
          Write-Host "文件大小: $((Get-Item $zipFullPath).Length / 1MB) MB"

      - name: Collect artifacts
        shell: pwsh
        run: |
          mkdir dist-out -ErrorAction SilentlyContinue
          Copy-Item desktop\src-tauri\target\release\bundle\nsis\*.exe dist-out\ -ErrorAction SilentlyContinue
          Copy-Item desktop\src-tauri\target\release\bundle\nsis\*.exe.sig dist-out\ -ErrorAction SilentlyContinue
          Copy-Item desktop\dist\updater.json dist-out\ -ErrorAction SilentlyContinue
          Copy-Item cc-bridge_*.zip dist-out\ -ErrorAction SilentlyContinue

      - uses: actions/upload-artifact@v4
        with:
          name: cc-bridge-windows
          path: dist-out/*

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-out/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
