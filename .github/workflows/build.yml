name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    name: Run Rust test suite (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test
        run: cargo test
        working-directory: desktop/src-tauri

  build-windows:
    name: Build Windows exe + installer
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri desktop app (NSIS installer)
        run: |
          npm install
          npm run build
        working-directory: desktop

      - name: Collect artifacts
        run: |
          mkdir dist-out
          copy desktop\src-tauri\target\release\bundle\nsis\*.exe dist-out\
        shell: cmd

      - uses: actions/upload-artifact@v4
        with:
          name: cc-bridge-windows
          path: dist-out/*

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
