<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cc-bridge 审计性能看板</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font-family: ui-sans-serif, system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
         margin: 0; padding: 24px; background: #f6f7f9; color: #1f2330; }
  @media (prefers-color-scheme: dark) { body { background: #16181d; color: #e8eaf0; } }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: #6b7280; font-size: 13px; margin-bottom: 16px; }
  .bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 18px;
         padding: 12px; background: rgba(127,127,127,.08); border-radius: 10px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .tile { background: rgba(127,127,127,.08); border-radius: 10px; padding: 12px; }
  .tile .k { font-size: 12px; color: #6b7280; }
  .tile .v { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
  .card { background: rgba(127,127,127,.06); border: 1px solid rgba(127,127,127,.15);
          border-radius: 12px; padding: 14px; }
  .card h3 { font-size: 13px; margin: 0 0 10px; font-weight: 600; }
  .legend { font-size: 12px; display: flex; flex-direction: column; gap: 3px; }
  .legend .r { display: flex; align-items: center; gap: 6px; }
  .legend .dot { width: 10px; height: 10px; border-radius: 3px; flex: none; }
  .legend .nm { width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #6b7280; }
  .legend .pc { font-variant-numeric: tabular-nums; }
  .concl { white-space: pre-wrap; font-size: 13px; line-height: 1.55;
           background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.25);
           border-radius: 10px; padding: 12px; }
  .concl .h { font-weight: 700; color: #6366f1; display: flex; gap: 6px; margin-bottom: 6px; }
  svg text { font-family: ui-monospace, monospace; }
  .empty { padding: 40px; text-align: center; color: #6b7280; }
</style>
</head>
<body>
  <h1>cc-bridge 审计性能看板</h1>
  <div class="sub">加载 audit.log 即可看到统计图与分析图（与 app 内 LogTab「性能分析」面板同算法）。<br>
    默认日志路径：<code>C:\Users\&lt;你&gt;\AppData\Roaming\com.ccbridge.desktop\audit.log</code></div>
  <div class="bar">
    <input type="file" id="file" accept=".log,.json,.txt" />
    <button id="demo" style="padding:6px 12px;border-radius:8px;border:1px solid #888;background:transparent;color:inherit;cursor:pointer;">载入本机示例</button>
  </div>
  <div id="out"><div class="empty">请选择 audit.log 文件，或点「载入本机示例」。</div></div>

<script>
const PALETTE = ["#6366f1","#14b8a6","#f59e0b","#ef4444","#10b981","#8b5cf6","#0ea5e9","#ec4899","#84cc16","#f97316"];
const BINS = [["0–10",0,10],["10–50",10,50],["50–100",50,100],["100–500",100,500],["500–1k",500,1000],["1k–5k",1000,5000],[">5k",5000,Infinity]];
const FALLBACK = "C:/Users/19145/AppData/Roaming/com.ccbridge.desktop/audit.log";

function pct(s,p){ if(!s.length) return 0; if(s.length===1) return s[0]; const i=(s.length-1)*p,lo=Math.floor(i),hi=Math.ceil(i); return lo===hi? s[lo] : s[lo]*(1-(i-lo))+s[hi]*(i-lo); }
function fmt(ms){ return ms>=1000 ? (ms/1000).toFixed(1)+"s" : Math.round(ms)+"ms"; }

function analyze(text){
  const lines = text.split("\n").map(s=>s.trim()).filter(Boolean);
  const valid=[]; for(const l of lines){ try{ const o=JSON.parse(l); if(typeof o.durationMs==="number") valid.push(o); }catch{} }
  if(!valid.length) return null;
  const d=valid.map(e=>e.durationMs).sort((a,b)=>a-b);
  const total=d.reduce((s,x)=>s+x,0);
  const overall={count:valid.length,totalMs:total,p50:pct(d,.5),p90:pct(d,.9),p95:pct(d,.95),p99:pct(d,.99),max:d[d.length-1]};
  const byTool=new Map(); for(const e of valid){ const a=byTool.get(e.tool)||[]; a.push(e.durationMs); byTool.set(e.tool,a); }
  const tools=[...byTool.entries()].map(([t,ds])=>{ ds.sort((a,b)=>a-b); const s=ds.reduce((x,y)=>x+y,0);
    return {tool:t,count:ds.length,sum:s,mean:s/ds.length,p50:pct(ds,.5),p95:pct(ds,.95),share:total?s/total:0}; }).sort((a,b)=>b.sum-a.sum);
  const hist=BINS.map(([label,lo,hi])=>({label,count:valid.filter(e=>e.durationMs>=lo&&e.durationMs<hi).length}));
  const topN=[...valid].sort((a,b)=>b.durationMs-a.durationMs).slice(0,10);
  let verdict = overall.p95<20?"网络 RTT 主导（架构层）—— 应减少往返，而非优化服务端"
              : overall.p95<100?"网络 RTT 与服务端处理混合 —— 双管齐下"
              : "服务端处理偏慢 —— 优先优化高占比工具（见下）";
  const dom=tools[0];
  const conclusion = [
    `总体：调用 ${overall.count} 次，合计 ${fmt(overall.totalMs)}，P50 ${overall.p50.toFixed(0)}ms / P95 ${overall.p95.toFixed(0)}ms / P99 ${overall.p99.toFixed(0)}ms。`,
    dom? `耗时主因：「${dom.tool}」占 ${(dom.share*100).toFixed(1)}%（${fmt(dom.sum)}），平均 ${dom.mean.toFixed(0)}ms、P95 ${dom.p95.toFixed(0)}ms。\n    建议：参照功能优化清单对应条目优先处理该工具。`:"",
    `瓶颈判定：${verdict}。`
  ].filter(Boolean).join("\n");
  return {overall,tools,hist,topN,conclusion};
}

function polar(cx,cy,r,deg){ const a=(deg-90)*Math.PI/180; return [cx+r*Math.cos(a),cy+r*Math.sin(a)]; }
function annular(cx,cy,ro,ri,s,e){ const [sx,sy]=polar(cx,cy,ro,e),[ex,ey]=polar(cx,cy,ro,s),[sx2,sy2]=polar(cx,cy,ri,s),[ex2,ey2]=polar(cx,cy,ri,e);
  const lg=e-s>180?1:0; return `M ${sx.toFixed(2)} ${sy.toFixed(2)} A ${ro} ${ro} 0 ${lg} 0 ${ex.toFixed(2)} ${ey.toFixed(2)} L ${sx2.toFixed(2)} ${sy2.toFixed(2)} A ${ri} ${ri} 0 ${lg} 1 ${ex2.toFixed(2)} ${ey2.toFixed(2)} Z`; }

function render(r){
  const {overall,tools,hist,topN,conclusion}=r;
  const maxP95=Math.max(1,...tools.map(t=>t.p95));
  const maxHist=Math.max(1,...hist.map(h=>h.count));
  const maxTop=Math.max(1,...topN.map(e=>e.durationMs));
  const gw=Math.max(240,tools.length*56);

  const donut = tools.length===1 ? `<circle cx="60" cy="60" r="42" fill="${PALETTE[0]}"/>`
    : tools.map((t,i)=>{ const s=tools.slice(0,i).reduce((a,x)=>a+x.share*360,0); const e=s+t.share*360;
        if(t.share<=0) return ""; return `<path d="${annular(60,60,52,30,s,Math.min(e,s+359.99))}" fill="${PALETTE[i%PALETTE.length]}"/>`; }).join("");
  const legend = tools.slice(0,8).map((t,i)=>`<div class="r"><span class="dot" style="background:${PALETTE[i%PALETTE.length]}"></span>
    <span class="nm">${t.tool}</span><span class="pc">${(t.share*100).toFixed(1)}%</span></div>`).join("");

  const bars = tools.map((t,i)=>{ const x=i*56+14,w=16; const h5=t.p50/maxP95*130, h9=t.p95/maxP95*130;
    return `<g><rect x="${x}" y="${150-h5}" width="${w}" height="${h5}" fill="${PALETTE[i%PALETTE.length]}" rx="2"/>
      <rect x="${x+w+4}" y="${150-h9}" width="${w}" height="${h9}" fill="#94a3b8" rx="2"/>
      <text x="${x+w+2}" y="163" font-size="9" text-anchor="middle" fill="#6b7280">${t.tool.slice(0,6)}</text></g>`; }).join("");

  const histSvg = hist.map((h,i)=>{ const bw=320/hist.length, hgt=h.count/maxHist*130, x=i*bw+4;
    return `<g><rect x="${x}" y="${150-hgt}" width="${bw-8}" height="${hgt}" fill="${PALETTE[i%PALETTE.length]}" rx="2"/>
      <text x="${x+(bw-8)/2}" y="163" font-size="9" text-anchor="middle" fill="#6b7280">${h.label}</text>
      ${h.count?`<text x="${x+(bw-8)/2}" y="${150-hgt-3}" font-size="9" text-anchor="middle" fill="currentColor">${h.count}</text>`:""}</g>`; }).join("");

  const topRows = topN.map((e,i)=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px;margin:4px 0">
    <span style="width:18px;text-align:right;color:#6b7280">${i+1}</span>
    <span style="width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#6b7280">${e.tool}</span>
    <div style="flex:1;height:14px;background:rgba(127,127,127,.15);border-radius:4px;overflow:hidden">
      <div style="height:100%;background:#ef4444cc;width:${(e.durationMs/maxTop*100).toFixed(1)}%"></div></div>
    <span style="width:70px;text-align:right;font-variant-numeric:tabular-nums">${e.durationMs}ms</span></div>`).join("");

  document.getElementById("out").innerHTML = `
    <div class="stats">
      <div class="tile"><div class="k">调用总数</div><div class="v">${overall.count}</div></div>
      <div class="tile"><div class="k">总耗时</div><div class="v">${fmt(overall.totalMs)}</div></div>
      <div class="tile"><div class="k">P50</div><div class="v">${overall.p50.toFixed(0)}ms</div></div>
      <div class="tile"><div class="k">P95</div><div class="v">${overall.p95.toFixed(0)}ms</div></div>
      <div class="tile"><div class="k">P99</div><div class="v">${overall.p99.toFixed(0)}ms</div></div>
    </div>
    <div class="grid">
      <div class="card"><h3>各工具耗时占比（按总耗时）</h3>
        <div style="display:flex;gap:16px;align-items:center">
          <svg viewBox="0 0 120 120" style="height:144px;width:144px;flex:none">${donut}</svg>
          <div class="legend">${legend}</div></div></div>
      <div class="card"><h3>各工具 P50 / P95 对比（ms）</h3>
        <svg viewBox="0 0 ${gw} 170" style="width:100%">${bars}
          <rect x="${gw-150}" y="6" width="10" height="10" fill="${PALETTE[0]}" rx="2"/><text x="${gw-136}" y="15" font-size="9" fill="#6b7280">P50</text>
          <rect x="${gw-90}" y="6" width="10" height="10" fill="#94a3b8" rx="2"/><text x="${gw-76}" y="15" font-size="9" fill="#6b7280">P95</text>
          <text x="0" y="166" font-size="8" fill="#6b7280">纵轴峰值 ${maxP95.toFixed(0)}ms</text></svg></div>
      <div class="card"><h3>整体延迟分布（调用次数）</h3>
        <svg viewBox="0 0 320 170" style="width:100%">${histSvg}<line x1="0" y1="150" x2="320" y2="150" stroke="rgba(127,127,127,.3)"/></svg></div>
      <div class="card"><h3>最慢的 10 次调用</h3>${topRows}</div>
    </div>
    <div class="concl" style="margin-top:16px"><div class="h">⚠ 自动诊断结论</div>${conclusion}</div>`;
}

document.getElementById("file").addEventListener("change", e=>{
  const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=()=>{ const r=analyze(rd.result); document.getElementById("out").innerHTML = r? "" : `<div class="empty">该文件无带 durationMs 的记录。</div>`; if(r) render(r); };
  rd.readAsText(f);
});
document.getElementById("demo").addEventListener("click", async ()=>{
  try{ const t=await (await fetch(FALLBACK)).text(); const r=analyze(t); if(r) render(r); else alert("本机示例路径无数据或无前端读取权限（浏览器 file:// 限制）。请用「选择文件」加载 audit.log。"); }
  catch(err){ alert("无法自动读取本机日志（浏览器安全限制）。请点「选择文件」手动加载 audit.log。\n\n路径：\n"+FALLBACK); }
});
</script>
</body>
</html>
