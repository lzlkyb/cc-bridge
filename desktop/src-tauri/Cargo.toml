[package]
name = "cc-bridge-desktop"
version = "1.0.0"
description = "Native desktop shell for cc-bridge (Node.js sidecar + web panel)"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-shell = "2"
tauri-plugin-single-instance = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
url = "2"
